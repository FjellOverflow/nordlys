[settings]
all_compile = false

[tools]
node = "24"
pnpm = "11.5"

[tasks.setup]
run = "pnpm i --frozen-lockfile"

[tasks.dev]
depends = ["setup"]
run = "pnpm dev --host"

[tasks.build]
depends = ["setup"]
run = "pnpm build"

[tasks.preview]
depends = ["build"]
run = "pnpm preview"

[tasks.lint]
depends = ["setup"]
run = "pnpm lint"

[tasks.check]
depends = ["setup"]
run = "pnpm check"

[tasks.ci]
depends = ["setup", "lint", "check"]

[tasks."test:setup"]
depends = ["setup"]
run = "pnpm playwright install chromium"

[tasks.test]
depends = ["setup", "build", "test:setup"]
run = "pnpm test"

[tasks."test:regenerate"]
depends = ["setup", "test:setup"]
run = "pnpm test:regenerate"

[tasks.release]
depends = ["setup", "lint", "check", "test"]
confirm = "Are you sure you want to release?"
run = "pnpm release && git push --follow-tags"